name: Build and Release LLM Shield

on:
  push:
    branches:
      - main
      - rust-node
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
          - host: macos-14
            target: x86_64-apple-darwin
            name: macos-intel
          - host: macos-14
            target: aarch64-apple-darwin
            name: macos-silicon

    name: Build ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx napi build --release --target ${{ matrix.settings.target }}
        env:
          PYO3_PYTHON: python3

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.settings.name }}
          path: "*.node"
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir release-assets
          cp artifacts/bridge-windows-x64/*.node release-assets/
          cp artifacts/bridge-macos-intel/*.node release-assets/
          cp artifacts/bridge-macos-silicon/*.node release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.node
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js for Publishing
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
