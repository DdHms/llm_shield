name: Build and Release LLM Shield

on:
  push:
    branches:
      - main
      - rust-node
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)
  pull_request:

jobs:
  build-standalone:
    name: Build Standalone (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: LLMShield-linux
          - os: windows-latest
            artifact_name: LLMShield-windows.exe
          - os: macos-latest
            artifact_name: LLMShield-macos-intel
          - os: macos-14
            artifact_name: LLMShield-macos-silicon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest pytest-asyncio httpx fastapi

      - name: Run Tests
        run: |
          pytest tests/test_scrubbing.py tests/test_case_insensitive_exclusions.py tests/test_fix_overscrubbing.py tests/test_live_exclusions.py

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "LLMShield" --add-data "src/dashboard.html:src" src/proxy.py

      - name: Create DMG (macOS only)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "LLMShield" -srcfolder "dist/LLMShield.app" -ov -format UDZO "dist/${{ matrix.artifact_name }}.dmg"

      - name: Rename binary (non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/LLMShield.exe dist/${{ matrix.artifact_name }}
          else
            mv dist/LLMShield dist/${{ matrix.artifact_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-standalone]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir release-assets
          find artifacts -type f -name "LLMShield-*" -exec cp {} release-assets/ \;
          find artifacts -type f -name "*.dmg" -exec cp {} release-assets/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
