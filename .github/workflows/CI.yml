name: Build Native Addon

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
          - host: macos-13
            target: x86_64-apple-darwin
            name: macos-intel
          - host: macos-14
            target: aarch64-apple-darwin
            name: macos-silicon

    name: Build ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx napi build --release --target ${{ matrix.settings.target }}
        env:
          # Ensure PyO3 uses the Python version we just set up
          PYO3_PYTHON: python

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.settings.name }}
          path: "*.node"
          if-no-files-found: error
